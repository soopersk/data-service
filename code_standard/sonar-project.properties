# ============================================================================
# SonarQube Configuration
# ============================================================================
# Most settings are in pom.xml <properties>. This file provides overrides
# for settings that are cleaner to manage outside Maven.
# ============================================================================

# Source and test directories
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions (duplicated from pom.xml for clarity)
sonar.exclusions=\
  **/config/**,\
  **/model/dto/**,\
  **/model/entity/**,\
  **/*Application.java

sonar.coverage.exclusions=\
  **/config/**,\
  **/model/dto/**,\
  **/model/entity/**,\
  **/*Application.java,\
  **/exception/**

# Duplication exclusions
sonar.cpd.exclusions=\
  **/model/dto/**,\
  **/model/entity/**
