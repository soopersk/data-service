# File: src/main/resources/application.yml
spring:
  application:
    name: observability-service-main
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:observability}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: ObservabilityHikariCP
      leak-detection-threshold: 60000

  # NO JPA configuration needed!

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0
    schemas: public
    validate-on-migrate: true
#    clean-disabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 900000  # 15 minutes default
      cache-null-values: false

  task:
    scheduling:
      pool:
        size: 5
        thread-name-prefix: scheduled-
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100
        thread-name-prefix: async-

# Actuator Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:local}

# Custom properties: Observability Configuration
observability:
  security:
    basic:
      username: ${OBS_BASIC_USER:admin}
      password: ${OBS_BASIC_PASSWORD:admin}
      role: ${OBS_BASIC_ROLE:USER}
  sla:
    live-tracking:
      enabled: true
    # OPTIMIZED: Live detection every 2 minutes (tolerance: few minutes)
    live-detection:
      enabled: true
      interval-ms: 120000        # Every 2 minutes (good balance)
      initial-delay-ms: 30000    # Start after 30 seconds

    # Early warning for approaching SLA
    early-warning:
      enabled: true
      interval-ms: 180000        # Every 3 minutes
      threshold-minutes: 10      # Warn if SLA within 10 minutes

  alerts:
    channel: logging

  regional-batch:
    overall-sla-time-cet: "17:45"
    region-order: [WMAP, WMDE, ASIA, WMUS, AUNZ, WMCH, ZURI, LDNL, AMER, EURO]

  # Unified Calculator Dashboard — section definitions
  # Calculator IDs are placeholders; replace with real IDs from the Airflow team.
  dashboard:
    sections:
      - section-key: REGIONAL
        display-name: Regional
        display-order: 1
        sla-time-cet: "17:45"
        calculators: []  # Regional uses regional-batch.region-order above

      - section-key: PORTFOLIO
        display-name: Portfolio
        display-order: 2
        sla-time-cet: "18:30"
        depends-on: REGIONAL
        display-labels:
          - "CAP 8 - Securitization"
          - "CAP 10 - Counterparty credit risk on derivatives and SFTs"
          - "CAP 12 - Leverage ratio denominator"
          - "CAP 13 - Credit valuation adjustments"
          - "CAP 14 - Business indicator component"
        calculators:
          - calculator-id: portfolio-calc
            display-name: Portfolio

      - section-key: GROUP_PORTFOLIO
        display-name: Group portfolio
        display-order: 3
        sla-time-cet: "19:00"
        depends-on: PORTFOLIO
        calculators:
          - calculator-id: group-portfolio-calc
            display-name: Group portfolio

      - section-key: RISK_GOVERNED
        display-name: Risk governed
        display-order: 4
        sla-time-cet: "20:30"
        calculators:
          - calculator-id: gemini-hedge-calc
            display-name: Gemini Hedge
          - calculator-id: modelled-exposure-calc
            display-name: Modelled Exposure
            has-sub-runs: true
            sub-runs:
              - sub-run-key: OTC
                calculator-id: model-exposure-otc
              - sub-run-key: ETD
                calculator-id: model-exposure-etd
              - sub-run-key: SFT
                calculator-id: model-exposure-sft

      - section-key: CONSOLIDATION
        display-name: Consolidation
        display-order: 5
        sla-time-cet: "21:00"
        depends-on: GROUP_PORTFOLIO
        calculators:
          - calculator-id: consolidation-calc
            display-name: Consolidation

  cache:
    eviction:
      enabled: true

  partitions:
    management:
      enabled: true
      create-cron: "0 0 1 * * *"  # Daily at 1 AM

# Logging
logging:
  level:
    root: INFO
    com.company.observability: DEBUG
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.cache: TRACE
    org.springframework.cache.interceptor: TRACE
    org.springframework.data.redis.cache: TRACE
    io.lettuce.core: DEBUG

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
