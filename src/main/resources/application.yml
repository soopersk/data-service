# File: src/main/resources/application.yml
spring:
  application:
    name: observability-service-main
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:observability}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: ObservabilityHikariCP
      leak-detection-threshold: 60000

  # NO JPA configuration needed!

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0
    schemas: public
    validate-on-migrate: true
#    clean-disabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 900000  # 15 minutes default
      cache-null-values: false

  task:
    scheduling:
      pool:
        size: 5
        thread-name-prefix: scheduled-
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100
        thread-name-prefix: async-

# Actuator Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:local}

# Custom properties: Observability Configuration
observability:
  security:
    basic:
      username: ${OBS_BASIC_USER:admin}
      password: ${OBS_BASIC_PASSWORD:admin}
      role: ${OBS_BASIC_ROLE:USER}
    admin:
      username: ${OBS_ADMIN_USER:ops}
      password: ${OBS_ADMIN_PASSWORD:ops}
  sla:
    # Phase-1: clock-time SLA (HH:mm UTC). Set to DURATION to restore legacy behaviour.
    mode: CLOCK_TIME

    live-tracking:
      enabled: true

    # Duration-based (average-runtime) SLA grading. The deadline is derived at run
    # start from the calculator's own trailing-window average runtime and frozen into
    # the run's slaTime.
    duration-based:
      enabled: true
      threshold-percent: 20        # percentage buffer over the resolved baseline
      late-band-minutes: 15        # ON_TIME upper edge beyond buffered baseline
      very-late-band-minutes: 30   # LATE upper edge beyond buffered baseline
      min-sample-size: 5           # runs required before trusting the average
      lookback:
        daily-days: 30
        monthly-days: 395

    # OPTIMIZED: Live detection every 2 minutes (tolerance: few minutes)
    live-detection:
      enabled: true
      interval-ms: 120000        # Every 2 minutes (good balance)
      initial-delay-ms: 30000    # Start after 30 seconds

    # Early warning for approaching SLA
    early-warning:
      enabled: true
      interval-ms: 180000        # Every 3 minutes
      threshold-minutes: 10      # Warn if SLA within 10 minutes

  # End-of-day aggregation + calculator-profile cache. calculator_sli_daily is populated
  # nightly (not per completion); slowly-changing profiles (avg runtime, avg start/end)
  # are cached in Redis and reused for SLA baselines and estimated start/end.
  aggregation:
    daily:
      enabled: true
      cron: "0 30 0 * * *"        # 00:30 every day
    recompute-window-days: 3       # trailing reporting dates recomputed (late completions)
    profile-cache-ttl-hours: 26
    empty-profile-cache-ttl-minutes: 60

  alerts:
    channel: logging

  regional-batch:
    overall-sla-time-cet: "17:45"
    region-order: [WMAP, WMDE, ASIA, WMUS, AUNZ, WMCH, ZURI, LDNL, AMER, EURO]

  # Unified Calculator Dashboard — section definitions
  # Calculator IDs are placeholders; replace with real IDs from the Airflow team.
  dashboard:
    late-threshold-ms: 3600000
    sections:
      - section-key: REGIONAL
        display-name: Regional
        display-order: 1
        sla-time-cet: "17:45"
        frequency-applicable: [DAILY, MONTHLY]
        nodes:
          - node-key: REGIONAL_MATRIX
            display-name: Regional
            display-order: 1
            matrix-config:
              dimension: REGION
              row-label: "Run status"
              columns:
                - key: WMAP
                  calculator-id: regional-batch-wmap
                - key: WMDE
                  calculator-id: regional-batch-wmde
                - key: ASIA
                  calculator-id: regional-batch-asia
                - key: WMUS
                  calculator-id: regional-batch-wmus
                - key: AUNZ
                  calculator-id: regional-batch-aunz
                - key: WMCH
                  calculator-id: regional-batch-wmch
                - key: ZURI
                  calculator-id: regional-batch-zuri
                - key: LDNL
                  calculator-id: regional-batch-ldnl
                - key: AMER
                  calculator-id: regional-batch-amer
                - key: EURO
                  calculator-id: regional-batch-euro

      - section-key: PORTFOLIO
        display-name: Portfolio
        display-order: 2
        sla-time-cet: "18:30"
        depends-on: REGIONAL
        frequency-applicable: [DAILY, MONTHLY]
        nodes:
          - node-key: PORTFOLIO
            display-name: Portfolio
            display-order: 1
            calculator-id: portfolio-calc
            display-labels:
              - "CAP 8 - Securitization"
              - "CAP 10 - Counterparty credit risk on derivatives and SFTs"
              - "CAP 12 - Leverage ratio denominator"
              - "CAP 13 - Credit valuation adjustments"
              - "CAP 14 - Business indicator component"

      - section-key: GROUP_PORTFOLIO
        display-name: Group portfolio
        display-order: 3
        sla-time-cet: "19:00"
        depends-on: PORTFOLIO
        frequency-applicable: [DAILY, MONTHLY]
        nodes:
          - node-key: GROUP_PORTFOLIO
            display-name: Group portfolio
            display-order: 1
            calculator-id: group-portfolio-calc

      - section-key: RISK_GOVERNED
        display-name: Risk governed
        display-order: 4
        sla-time-cet: "20:30"
        frequency-applicable: [DAILY, MONTHLY]
        nodes:
          - node-key: MODELLED_EXPOSURE
            display-name: Modelled Exposure
            display-order: 1
            matrix-config:
              dimension: TYPE
              row-label: "Run status"
              columns:
                - key: OTC
                  calculator-id: model-exposure-otc
                - key: ETD
                  calculator-id: model-exposure-etd
                - key: SFT
                  calculator-id: model-exposure-sft

          - node-key: GEMINI_HEDGE
            display-name: Gemini Hedge
            display-order: 2
            matrix-config:
              dimension: TYPE
              row-label: "Run status"
              columns:
                - key: OTC
                  calculator-id: gemini-hedge-otc
                - key: ETD
                  calculator-id: gemini-hedge-etd
                - key: SFT
                  calculator-id: gemini-hedge-sft

      - section-key: CONSOLIDATION
        display-name: Consolidation
        display-order: 5
        sla-time-cet: "21:00"
        depends-on: GROUP_PORTFOLIO
        frequency-applicable: [DAILY, MONTHLY]
        nodes:
          - node-key: CONSOLIDATION
            display-name: Consolidation
            display-order: 1
            calculator-id: consolidation-calc

  cache:
    eviction:
      enabled: true

  partitions:
    management:
      enabled: true

# Logging
logging:
  level:
    root: INFO
    com.company.observability: DEBUG
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.cache: TRACE
    org.springframework.cache.interceptor: TRACE
    org.springframework.data.redis.cache: TRACE
    io.lettuce.core: DEBUG

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
