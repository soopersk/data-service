# File: src/main/resources/application.yml
spring:
  application:
    name: observability-service-main
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:observability}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: ObservabilityHikariCP
      leak-detection-threshold: 60000

  # NO JPA configuration needed!

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0
    schemas: public
    validate-on-migrate: true
#    clean-disabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 900000  # 15 minutes default
      cache-null-values: false

  task:
    scheduling:
      pool:
        size: 5
        thread-name-prefix: scheduled-
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100
        thread-name-prefix: async-

# Actuator Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:local}

# Custom properties: Observability Configuration
observability:
  security:
    basic:
      username: ${OBS_BASIC_USER:admin}
      password: ${OBS_BASIC_PASSWORD:admin}
      role: ${OBS_BASIC_ROLE:USER}
  sla:
    live-tracking:
      enabled: true
    # OPTIMIZED: Live detection every 2 minutes (tolerance: few minutes)
    live-detection:
      enabled: true
      interval-ms: 120000        # Every 2 minutes (good balance)
      initial-delay-ms: 30000    # Start after 30 seconds

    # Early warning for approaching SLA
    early-warning:
      enabled: true
      interval-ms: 180000        # Every 3 minutes
      threshold-minutes: 10      # Warn if SLA within 10 minutes

  alerts:
    channel: logging

  cache:
    eviction:
      enabled: true

  partitions:
    management:
      enabled: true
      create-cron: "0 0 1 * * *"  # Daily at 1 AM

# Logging
logging:
  level:
    root: INFO
    com.company.observability: DEBUG
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.cache: TRACE
    org.springframework.cache.interceptor: TRACE
    org.springframework.data.redis.cache: TRACE
    io.lettuce.core: DEBUG

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
