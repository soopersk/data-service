observability:
  sla:
    live-tracking:
      enabled: false          # unit tests toggle this explicitly via ReflectionTestUtils
    live-detection:
      enabled: false          # prevents scheduler beans from loading in slice tests
  cache:
    warm-on-completion: false # disables CacheWarmingService listener in slice tests
    legacy-eviction-listener:
      enabled: false
  security:
    basic:
      username: test
      password: test

logging:
  level:
    com.company.observability: DEBUG
